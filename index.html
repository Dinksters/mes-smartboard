<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MES Campus School - Smart Portal</title>
    <!-- PDF.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Fabric.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-dark: #1d1d1f;
            --apple-blue: #0071e3;
            --apple-gray: #86868b;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --menu-bg: rgba(30, 39, 46, 0.95);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--apple-bg);
            color: var(--apple-dark);
            -webkit-font-smoothing: antialiased;
            overflow: hidden; 
            user-select: none; /* Prevents accidental text selection while panning */
        }

        /* --- DASHBOARD UI --- */
        #dashboard-view { display: flex; min-height: 100vh; background: var(--light); color: var(--dark); }
        .sidebar { width: 280px; background: white; padding: 30px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); overflow-y: auto; }
        .sidebar h2 { font-size: 20px; margin-bottom: 25px; color: var(--dark); }
        .nav-group { margin-bottom: 20px; }
        .nav-group label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: bold; }
        .nav-btn {
            display: block; width: 100%; padding: 12px; border: none; background: #f1f2f6; 
            border-radius: 8px; margin-bottom: 8px; cursor: pointer; text-align: left; font-size: 14px; font-weight: 500; transition: 0.2s;
        }
        .nav-btn.active { background: var(--apple-blue); color: white; }
        .special-btn { background: linear-gradient(135deg, #0071e3, #34c759); color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .book-card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s;}
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.15);}
        .book-icon { font-size: 40px; margin-bottom: 10px; }
        .book-title { font-weight: 600; color: var(--apple-dark); font-size: 14px; line-height: 1.4; }

        /* --- WHITEBOARD & VIEWPORT --- */
        #whiteboard-view { display: none; width: 100vw; height: 100vh; position: relative; background: #dcdde1; }
        
        #viewport {
            width: 100%; height: 100%; overflow: auto; position: relative; touch-action: none;
        }

        #board-wrapper {
            position: relative; margin: 40px auto; 
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            transform-origin: top center; transition: transform 0.1s ease-out;
        }

        .pdf-page-container {
            position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 8px; overflow: hidden;
        }

        #pdf-layer, .canvas-container { position: absolute !important; top: 0; left: 0; }
        #pdf-layer { z-index: 5; }
        .canvas-container { z-index: 10; }

        /* --- INTEGRATED SENSES OS DOCK --- */
        .senses-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        /* Top Row: System Controls (Home, Zoom, Export) */
        .system-container {
            display: flex; gap: 8px; background: rgba(255, 255, 255, 0.9); padding: 8px 15px;
            border-radius: 30px; backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            opacity: 0; transform: translateY(10px) scale(0.9); pointer-events: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Bottom Row: Drawing Tools */
        .tools-container {
            display: flex; gap: 8px; background: var(--menu-bg); padding: 12px 20px;
            border-radius: 40px; backdrop-filter: blur(10px); flex-wrap: wrap; justify-content: center;
            opacity: 0; transform: translateY(20px) scale(0.9); pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }

        .tools-container.open, .system-container.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

        .tool-btn {
            background: transparent; border: none; color: white; font-size: 20px;
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.2); }
        .tool-btn.active { background: var(--apple-blue); box-shadow: 0 0 10px rgba(0, 113, 227, 0.5); }
        
        .sys-btn {
            background: transparent; border: none; color: var(--apple-dark); font-size: 16px;
            padding: 6px 12px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .sys-btn:hover { background: rgba(0,0,0,0.05); }

        .master-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: var(--apple-blue); color: white; font-size: 26px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.4); z-index: 101; transition: 0.3s;
        }
        .master-btn.open { transform: rotate(45deg); background: #ff3b30; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4); }

        .thickness-select {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white;
            border-radius: 20px; padding: 0 10px; font-weight: bold; outline: none; cursor: pointer;
        }

        /* --- APPLE UI COLOR PALETTE --- */
        .color-trigger {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; margin: 0 5px;
        }
        
        .apple-palette {
            display: none; position: absolute; bottom: 85px; background: rgba(250, 250, 250, 0.95);
            backdrop-filter: blur(20px); border-radius: 16px; padding: 15px;
            grid-template-columns: repeat(4, 1fr); gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.05); z-index: 105;
        }
        .apple-palette.show { display: grid; }
        .swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.1s; border: 2px solid transparent;}
        .swatch:hover { transform: scale(1.15); }
        .swatch.active { border-color: var(--apple-dark); transform: scale(1.15); }

        #toast { display: none; position: fixed; top: 40px; right: 20px; background: #34c759; color: white; padding: 15px 25px; border-radius: 10px; z-index: 1000; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

        @media print {
            .senses-dock, #toast { display: none !important; }
            #viewport { overflow: visible !important; height: auto !important; padding: 0 !important; }
            #board-wrapper { margin: 0 !important; gap: 0 !important; transform: scale(1) !important;}
            .pdf-page-container { box-shadow: none !important; margin-bottom: 0 !important; page-break-after: always; }
        }
    </style>
</head>
<body>

    <!-- DASHBOARD -->
    <div id="dashboard-view">
        <div class="sidebar">
            <h2>MES Portal 🏫</h2>
            
            <div class="nav-group">
                <label>Creative Tools</label>
                <button class="nav-btn special-btn" onclick="openBlankCanvas()">🪄 Blank Endless Canvas</button>
            </div>
            
            <div class="nav-group">
                <label>Languages</label>
                <button id="btn-English" class="nav-btn active" onclick="selectSection('English')">📝 English</button>
                <button id="btn-Hindi" class="nav-btn" onclick="selectSection('Hindi')">📙 Hindi</button>
                <button id="btn-Malayalam" class="nav-btn" onclick="selectSection('Malayalam')">🌴 Malayalam</button>
            </div>
            
            <div class="nav-group">
                <label>Science & Math</label>
                <button id="btn-MathsPart1" class="nav-btn" onclick="selectSection('MathsPart1')">📐 Maths (Pt 1)</button>
                <button id="btn-MathsPart2" class="nav-btn" onclick="selectSection('MathsPart2')">📐 Maths (Pt 2)</button>
                <button id="btn-GS" class="nav-btn" onclick="selectSection('GS')">🔬 General Science</button>
            </div>

            <div class="nav-group">
                <label>Social Science</label>
                <button id="btn-SSPart1" class="nav-btn" onclick="selectSection('SSPart1')">🌍 SS (Pt 1)</button>
                <button id="btn-SSPart2" class="nav-btn" onclick="selectSection('SSPart2')">🌍 SS (Pt 2)</button>
            </div>
        </div>
        <div class="main-content">
            <h1 id="dashboard-title">English Textbooks</h1>
            <div class="grid" id="books-grid"></div>
        </div>
    </div>

    <!-- WHITEBOARD -->
    <div id="whiteboard-view">
        
        <div id="viewport">
            <div id="board-wrapper">
                <!-- Canvases injected here -->
            </div>
        </div>

        <!-- INTEGRATED SENSES DOCK -->
        <div class="senses-dock">
            
            <!-- Apple Color Palette Popover -->
            <div class="apple-palette" id="color-palette">
                <!-- System Colors -->
                <div class="swatch active" style="background:#ff3b30" onclick="setColor('#ff3b30')"></div>
                <div class="swatch" style="background:#ff9500" onclick="setColor('#ff9500')"></div>
                <div class="swatch" style="background:#ffcc00" onclick="setColor('#ffcc00')"></div>
                <div class="swatch" style="background:#34c759" onclick="setColor('#34c759')"></div>
                <div class="swatch" style="background:#5ac8fa" onclick="setColor('#5ac8fa')"></div>
                <div class="swatch" style="background:#007aff" onclick="setColor('#007aff')"></div>
                <div class="swatch" style="background:#5856d6" onclick="setColor('#5856d6')"></div>
                <div class="swatch" style="background:#af52de" onclick="setColor('#af52de')"></div>
                <div class="swatch" style="background:#ff2d55" onclick="setColor('#ff2d55')"></div>
                <div class="swatch" style="background:#8e8e93" onclick="setColor('#8e8e93')"></div>
                <div class="swatch" style="background:#1d1d1f" onclick="setColor('#1d1d1f')"></div>
                <div class="swatch" style="background:#ffffff; border:1px solid #ddd" onclick="setColor('#ffffff')"></div>
            </div>

            <!-- System Tools (Top Row) -->
            <div class="system-container" id="system-menu">
                <button class="sys-btn" style="color:#ff3b30;" onclick="closeBook()">🏠 Home</button>
                <div style="width:1px; background:rgba(0,0,0,0.1); margin:0 5px;"></div>
                <button class="sys-btn" onclick="zoomBoard(0.2)">➕ Zoom</button>
                <button class="sys-btn" onclick="zoomBoard(-0.2)">➖ Zoom</button>
                <div style="width:1px; background:rgba(0,0,0,0.1); margin:0 5px;"></div>
                <button class="sys-btn" onclick="readAloud()">🗣️ Read</button>
                <button class="sys-btn" onclick="exportToPDF()">🖨️ Export</button>
                <button class="sys-btn" onclick="manualSave()">💾 Save</button>
            </div>

            <!-- Drawing Tools (Bottom Row) -->
            <div class="tools-container" id="tools-menu">
                <button class="tool-btn" id="tool-move" onclick="setTool('move')" title="Pan Canvas">✋</button>
                <div style="width:1px; background:rgba(255,255,255,0.2); margin:0 5px;"></div>
                
                <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')" title="Pen">🖊️</button>
                <button class="tool-btn" id="tool-highlighter" onclick="setTool('highlighter')" title="Highlighter">🖍️</button>
                <button class="tool-btn" id="tool-text" onclick="setTool('text')" title="Type Text">🔤</button>
                
                <select id="brush-weight" class="thickness-select" onchange="updateProfile()">
                    <option value="2">Fine</option>
                    <option value="5" selected>Med</option>
                    <option value="15">Thick</option>
                </select>

                <!-- Custom Apple Color Trigger -->
                <div class="color-trigger" id="active-color-btn" style="background:#ff3b30" onclick="toggleColorPicker()"></div>
                
                <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser">🧽</button>
                <button class="tool-btn" onclick="clearBoard()" title="Clear Board">🗑️</button>
                
                <div style="width:1px; background:rgba(255,255,255,0.2); margin:0 5px;"></div>
                
                <button class="tool-btn" id="tool-rect" onclick="setTool('rect')">⬜</button>
                <button class="tool-btn" id="tool-circle" onclick="setTool('circle')">⭕</button>
                <button class="tool-btn" id="tool-triangle" onclick="setTool('triangle')">🔺</button>
            </div>
            
            <!-- Radial Toggle Button -->
            <button class="master-btn" id="master-toggle" onclick="toggleMenu()">❖</button>
        </div>
    </div>

    <div id="toast">Notes Saved! ✅</div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // --- FULL DATABASE WITH MALAYALAM & GS ---
        const database = {
            "English": [
                { title: "Intro Material", file: "Subjects/English/Intro.pdf" }, { title: "Chapter 2 - Sec 1", file: "Subjects/English/2 - 1.pdf" },
                { title: "Chapter 2 - Sec 2", file: "Subjects/English/2 - 2.pdf" }, { title: "Chapter 2 - Sec 3", file: "Subjects/English/2 - 3.pdf" },
                { title: "Chapter 2 - Transcript", file: "Subjects/English/2 - Transcript.pdf" }, { title: "Chapter 3 - Sec 1", file: "Subjects/English/3 - 1.pdf" },
                { title: "Chapter 3 - Sec 2", file: "Subjects/English/3 - 2.pdf" }, { title: "Chapter 3 - Sec 3", file: "Subjects/English/3 - 3.pdf" },
                { title: "Chapter 3 - Transcript", file: "Subjects/English/3 - Transcript.pdf" }, { title: "Chapter 4 - Sec 1", file: "Subjects/English/4 - 1.pdf" },
                { title: "Chapter 4 - Sec 2", file: "Subjects/English/4 - 2.pdf" }, { title: "Chapter 4 - Sec 3", file: "Subjects/English/4 - 3.pdf" },
                { title: "Chapter 4 - Transcript", file: "Subjects/English/4 - Transcript.pdf" }, { title: "Chapter 5 - Sec 1", file: "Subjects/English/5 - 1.pdf" },
                { title: "Chapter 5 - Sec 2", file: "Subjects/English/5 - 2.pdf" }, { title: "Chapter 5 - Sec 3", file: "Subjects/English/5 - 3.pdf" },
                { title: "Chapter 5 - Transcript", file: "Subjects/English/5 - Transcript.pdf" }
            ],
            "Hindi": [
                { title: "Introduction", file: "Subjects/Hindi/Intro.pdf" }, { title: "Chapter 1", file: "Subjects/Hindi/1.pdf" },
                { title: "Chapter 2", file: "Subjects/Hindi/2.pdf" }, { title: "Chapter 3", file: "Subjects/Hindi/3.pdf" },
                { title: "Chapter 4", file: "Subjects/Hindi/4.pdf" }, { title: "Chapter 5", file: "Subjects/Hindi/5.pdf" },
                { title: "Chapter 6", file: "Subjects/Hindi/6.pdf" }, { title: "Chapter 7", file: "Subjects/Hindi/7.pdf" },
                { title: "Chapter 8", file: "Subjects/Hindi/8.pdf" }, { title: "Chapter 9", file: "Subjects/Hindi/9.pdf" },
                { title: "Chapter 10", file: "Subjects/Hindi/10.pdf" }
            ],
            "Malayalam": [{ title: "Malayalam - Chapter 1", file: "Subjects/Malayalam/1.pdf" }, { title: "Malayalam - Chapter 2", file: "Subjects/Malayalam/2.pdf" }],
            "GS": [{ title: "General Science - Ch 1", file: "Subjects/GS/1.pdf" }, { title: "General Science - Ch 2", file: "Subjects/GS/2.pdf" }],
            "MathsPart1": [{ title: "Maths Pt 1 - Ch 1", file: "Subjects/Maths/Part 1/1.pdf" }, { title: "Maths Pt 1 - Ch 2", file: "Subjects/Maths/Part 1/2.pdf" }],
            "MathsPart2": [{ title: "Maths Pt 2 - Ch 1", file: "Subjects/Maths/Part 2/1.pdf" }, { title: "Maths Pt 2 - Ch 2", file: "Subjects/Maths/Part 2/2.pdf" }],
            "SSPart1": [{ title: "SS Part 1 - Ch 1", file: "Subjects/SS/Part 1/1.pdf" }, { title: "SS Part 1 - Ch 2", file: "Subjects/SS/Part 1/2.pdf" }],
            "SSPart2": [{ title: "SS Part 2 - Ch 1", file: "Subjects/SS/Part 2/1.pdf" }, { title: "SS Part 2 - Ch 2", file: "Subjects/SS/Part 2/2.pdf" }]
        };

        const titleMap = {
            "English": "English Textbooks", "Hindi": "Hindi Textbooks", "Malayalam": "Malayalam Textbooks", "GS": "General Science",
            "MathsPart1": "Mathematics - Part 1", "MathsPart2": "Mathematics - Part 2",
            "SSPart1": "Social Science - Part 1", "SSPart2": "Social Science - Part 2"
        };

        let currentSection = "English";
        let activeBook = null;
        let pdfDoc = null;
        let baseScale = 1.3; 
        let viewZoom = 1.0; 
        
        let fabricCanvases = [];
        let currentTool = 'pen';
        let activeColor = '#ff3b30';
        let pageDrawings = JSON.parse(localStorage.getItem('smartboard_master_notes')) || {};

        // --- DASHBOARD ROUTING ---
        function selectSection(sectionName) {
            currentSection = sectionName;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${sectionName}`).classList.add('active');
            document.getElementById('dashboard-title').textContent = titleMap[sectionName];
            renderDashboardBooks();
        }

        function renderDashboardBooks() {
            const grid = document.getElementById('books-grid');
            grid.innerHTML = "";
            const books = database[currentSection] || [];
            books.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => openBook(book);
                card.innerHTML = `<div class="book-icon">📘</div><div class="book-title">${book.title}</div>`;
                grid.appendChild(card);
            });
        }

        function toggleMenu() {
            document.getElementById('tools-menu').classList.toggle('open');
            document.getElementById('system-menu').classList.toggle('open');
            document.getElementById('master-toggle').classList.toggle('open');
            document.getElementById('color-palette').classList.remove('show'); // Hide color picker if closing
        }

        function toggleColorPicker() {
            document.getElementById('color-palette').classList.toggle('show');
        }

        function setColor(hex) {
            activeColor = hex;
            document.getElementById('active-color-btn').style.background = hex;
            
            document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
            event.target.classList.add('active');
            
            toggleColorPicker();
            updateProfile();
        }

        // --- BLANK ENDLESS CANVAS ENGINE ---
        function openBlankCanvas() {
            activeBook = { title: "Blank Canvas", isBlank: true };
            viewZoom = 1.0;
            document.getElementById('board-wrapper').style.transform = `scale(1)`;
            
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('whiteboard-view').style.display = 'flex';
            
            document.getElementById('tools-menu').classList.add('open');
            document.getElementById('system-menu').classList.add('open');
            document.getElementById('master-toggle').classList.add('open');

            const wrapper = document.getElementById('board-wrapper');
            wrapper.innerHTML = '';
            fabricCanvases = [];

            // Massive 10k x 10k Canvas
            const pageDiv = document.createElement('div');
            pageDiv.className = 'pdf-page-container';
            pageDiv.style.width = '10000px'; 
            pageDiv.style.height = '10000px'; 

            const drawCanv = document.createElement('canvas');
            pageDiv.appendChild(drawCanv);
            wrapper.appendChild(pageDiv);

            const fCanvas = new fabric.Canvas(drawCanv, { width: 10000, height: 10000, isDrawingMode: true, allowTouchScrolling: false });
            fabricCanvases.push({ canvas: fCanvas, key: `BlankCanvas_Master` });
            setupFabricEvents(fCanvas, `BlankCanvas_Master`);

            // Center the viewport on the huge canvas instantly
            const viewport = document.getElementById('viewport');
            viewport.scrollLeft = (10000 - window.innerWidth) / 2;
            viewport.scrollTop = (10000 - window.innerHeight) / 2;

            setTool('pen');
        }

        // --- CONTINUOUS SCROLL PDF ENGINE ---
        function openBook(book) {
            activeBook = book;
            activeBook.isBlank = false;
            viewZoom = 1.0;
            document.getElementById('board-wrapper').style.transform = `scale(1)`;
            
            const screenW = window.innerWidth;
            if (screenW < 600) baseScale = 0.6;
            else if (screenW < 1024) baseScale = 1.0;
            else baseScale = 1.3; 
            
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('whiteboard-view').style.display = 'flex';
            
            document.getElementById('tools-menu').classList.add('open');
            document.getElementById('system-menu').classList.add('open');
            document.getElementById('master-toggle').classList.add('open');
            
            pdfjsLib.getDocument(book.file).promise.then(pdf => {
                pdfDoc = pdf;
                renderContinuousPages();
            }).catch(err => {
                console.error(err);
                alert("File loading error. Ensure path declarations match perfectly.");
                closeBook();
            });
        }

        function renderContinuousPages() {
            const wrapper = document.getElementById('board-wrapper');
            wrapper.innerHTML = ''; 
            fabricCanvases = [];
            
            let promises = [];
            for (let num = 1; num <= pdfDoc.numPages; num++) {
                promises.push(pdfDoc.getPage(num).then(page => {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'pdf-page-container';
                    
                    const pdfCanv = document.createElement('canvas');
                    pdfCanv.style.position = 'absolute';
                    pdfCanv.style.zIndex = '5';
                    
                    const drawCanv = document.createElement('canvas');
                    drawCanv.style.position = 'absolute';
                    drawCanv.style.zIndex = '10';

                    pageDiv.appendChild(pdfCanv);
                    pageDiv.appendChild(drawCanv);
                    
                    return { page, num, pageDiv, pdfCanv, drawCanv };
                }));
            }

            Promise.all(promises).then(results => {
                results.sort((a,b) => a.num - b.num);

                results.forEach(res => {
                    wrapper.appendChild(res.pageDiv);
                    
                    const viewportRect = res.page.getViewport({ scale: baseScale });
                    res.pageDiv.style.width = `${viewportRect.width}px`;
                    res.pageDiv.style.height = `${viewportRect.height}px`;
                    res.pdfCanv.width = viewportRect.width;
                    res.pdfCanv.height = viewportRect.height;

                    res.page.render({ canvasContext: res.pdfCanv.getContext('2d'), viewport: viewportRect }).promise.then(() => {
                        const fCanvas = new fabric.Canvas(res.drawCanv, { width: viewportRect.width, height: viewportRect.height, isDrawingMode: true, allowTouchScrolling: false });
                        const storageKey = `${activeBook.title}_page_${res.num}`;
                        
                        fabricCanvases.push({ canvas: fCanvas, key: storageKey });
                        setupFabricEvents(fCanvas, storageKey);
                    });
                });
                
                setTimeout(() => { setTool(currentTool); }, 300);
            });
        }

        function setupFabricEvents(fCanvas, storageKey) {
            if (pageDrawings[storageKey]) {
                fCanvas.loadFromJSON(pageDrawings[storageKey], fCanvas.renderAll.bind(fCanvas));
            }

            let isDrawingShape = false;
            let shapeStartX, shapeStartY;
            let tempObj = null;

            fCanvas.on('mouse:down', function(options) {
                if (currentTool === 'eraser' && options.target) {
                    fCanvas.remove(options.target);
                    pageDrawings[storageKey] = fCanvas.toJSON();
                    return;
                }
                
                if (currentTool === 'text') {
                    const pointer = fCanvas.getPointer(options.e);
                    const textObj = new fabric.IText('Type here...', {
                        left: pointer.x, top: pointer.y, fill: activeColor, fontSize: 32, fontFamily: '-apple-system, sans-serif', fontWeight: 'bold'
                    });
                    fCanvas.add(textObj);
                    fCanvas.setActiveObject(textObj);
                    textObj.enterEditing();
                    textObj.selectAll();
                    setTool('pen'); 
                    pageDrawings[storageKey] = fCanvas.toJSON();
                    return;
                }

                if (['rect', 'circle', 'triangle'].includes(currentTool)) {
                    if (options.target) return; // Prevent shape duping on click
                    
                    isDrawingShape = true;
                    const pointer = fCanvas.getPointer(options.e);
                    shapeStartX = pointer.x; shapeStartY = pointer.y;
                    const weight = parseInt(document.getElementById('brush-weight').value);

                    if (currentTool === 'rect') tempObj = new fabric.Rect({ left: shapeStartX, top: shapeStartY, width: 0, height: 0, fill: 'transparent', stroke: activeColor, strokeWidth: weight, selectable: true });
                    else if (currentTool === 'circle') tempObj = new fabric.Circle({ left: shapeStartX, top: shapeStartY, radius: 0, fill: 'transparent', stroke: activeColor, strokeWidth: weight, selectable: true });
                    else if (currentTool === 'triangle') tempObj = new fabric.Triangle({ left: shapeStartX, top: shapeStartY, width: 0, height: 0, fill: 'transparent', stroke: activeColor, strokeWidth: weight, selectable: true });
                    
                    fCanvas.add(tempObj);
                }
            });

            fCanvas.on('mouse:move', function(o) {
                if (!isDrawingShape) return;
                const pointer = fCanvas.getPointer(o.e);
                
                if (currentTool === 'rect' || currentTool === 'triangle') {
                    if (shapeStartX > pointer.x) tempObj.set({ left: Math.abs(pointer.x) });
                    if (shapeStartY > pointer.y) tempObj.set({ top: Math.abs(pointer.y) });
                    tempObj.set({ width: Math.abs(shapeStartX - pointer.x) });
                    tempObj.set({ height: Math.abs(shapeStartY - pointer.y) });
                } else if (currentTool === 'circle') {
                    const rx = Math.abs(shapeStartX - pointer.x) / 2;
                    const ry = Math.abs(shapeStartY - pointer.y) / 2;
                    tempObj.set({ radius: Math.max(rx, ry) });
                    if (shapeStartX > pointer.x) tempObj.set({ left: pointer.x });
                    if (shapeStartY > pointer.y) tempObj.set({ top: pointer.y });
                }
                fCanvas.renderAll();
            });

            fCanvas.on('mouse:up', function() {
                if (isDrawingShape) {
                    isDrawingShape = false; tempObj = null;
                    pageDrawings[storageKey] = fCanvas.toJSON();
                }
            });

            fCanvas.on('object:added', () => pageDrawings[storageKey] = fCanvas.toJSON());
            fCanvas.on('object:modified', () => pageDrawings[storageKey] = fCanvas.toJSON());
        }

        // --- CLICK & DRAG TO PAN ENGINE ---
        const viewportContainer = document.getElementById('viewport');
        let isPanning = false, panStartX, panStartY, scrollL, scrollT;

        viewportContainer.addEventListener('mousedown', (e) => {
            if (currentTool !== 'move') return;
            isPanning = true;
            viewportContainer.style.cursor = 'grabbing';
            panStartX = e.pageX;
            panStartY = e.pageY;
            scrollL = viewportContainer.scrollLeft;
            scrollT = viewportContainer.scrollTop;
        });

        window.addEventListener('mouseup', () => { 
            isPanning = false; 
            if(currentTool === 'move') viewportContainer.style.cursor = 'grab'; 
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning || currentTool !== 'move') return;
            e.preventDefault();
            const x = e.pageX;
            const y = e.pageY;
            viewportContainer.scrollLeft = scrollL - (x - panStartX);
            viewportContainer.scrollTop = scrollT - (y - panStartY);
        });

        // --- HARDWARE TOOL ROUTING ---
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`tool-${tool}`)) document.getElementById(`tool-${tool}`).classList.add('active');

            const wrapper = document.getElementById('board-wrapper');

            if (tool === 'move') {
                fabricCanvases.forEach(fc => {
                    fc.canvas.isDrawingMode = false;
                    fc.canvas.selection = false;
                    fc.canvas.forEachObject(o => o.selectable = false);
                });
                wrapper.style.pointerEvents = 'none'; 
                viewportContainer.style.cursor = 'grab';
            } else {
                wrapper.style.pointerEvents = 'all'; 
                viewportContainer.style.cursor = 'default';

                fabricCanvases.forEach(fc => {
                    fc.canvas.selection = true;
                    fc.canvas.forEachObject(o => o.selectable = true);

                    if (['rect', 'circle', 'triangle', 'eraser', 'text'].includes(tool)) {
                        fc.canvas.isDrawingMode = false;
                    } else {
                        fc.canvas.isDrawingMode = true;
                    }
                });
                updateProfile();
            }
        }

        function updateProfile() {
            const weight = parseInt(document.getElementById('brush-weight').value);

            fabricCanvases.forEach(fc => {
                if (currentTool === 'pen') {
                    fc.canvas.freeDrawingBrush.color = activeColor;
                    fc.canvas.freeDrawingBrush.width = weight;
                } else if (currentTool === 'highlighter') {
                    const r = parseInt(activeColor.slice(1,3), 16);
                    const g = parseInt(activeColor.slice(3,5), 16);
                    const b = parseInt(activeColor.slice(5,7), 16);
                    fc.canvas.freeDrawingBrush.color = `rgba(${r}, ${g}, ${b}, 0.35)`;
                    fc.canvas.freeDrawingBrush.width = weight * 4;
                }
            });
        }

        // --- PERFECT-SYNC ZOOM ENGINE ---
        function zoomBoard(amount) {
            viewZoom += amount;
            if (viewZoom < 0.4) viewZoom = 0.4;
            if (viewZoom > 3.0) viewZoom = 3.0;
            document.getElementById('board-wrapper').style.transform = `scale(${viewZoom})`;
            setTimeout(() => { fabricCanvases.forEach(fc => fc.canvas.calcOffset()); }, 150);
        }

        // --- AI READ ALOUD ---
        function readAloud() {
            let foundText = false;
            fabricCanvases.forEach(fc => {
                const activeObj = fc.canvas.getActiveObject();
                if (activeObj && activeObj.type === 'i-text') {
                    const speech = new SpeechSynthesisUtterance(activeObj.text);
                    speech.lang = 'en-IN'; 
                    window.speechSynthesis.speak(speech);
                    foundText = true;
                }
            });
            if(!foundText) alert("Please use the 🔤 Text tool to type, select the text, then press Read.");
        }

        function exportToPDF() { if (activeBook) window.print(); }

        function manualSave() {
            localStorage.setItem('smartboard_master_notes', JSON.stringify(pageDrawings));
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        setInterval(() => {
            if (activeBook && fabricCanvases.length > 0) {
                localStorage.setItem('smartboard_master_notes', JSON.stringify(pageDrawings));
            }
        }, 60000);

        function clearBoard() {
            fabricCanvases.forEach(fc => {
                fc.canvas.clear();
                pageDrawings[fc.key] = fc.canvas.toJSON();
            });
        }

        function closeBook() {
            manualSave();
            fabricCanvases.forEach(fc => fc.canvas.dispose());
            fabricCanvases = [];
            document.getElementById('whiteboard-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'flex';
        }

        // Boot
        renderDashboardBooks();
    </script>
</body>
</html>
