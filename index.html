<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>MES Campus School - 7A Portal</title>
    <!-- PDF.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Fabric.js Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        /* --- MAC OS DESIGN SYSTEM --- */
        :root {
            --mac-bg: #F5F5F7;
            --mac-dark: #1D1D1F;
            --mac-blue: #007AFF;
            --mac-gray: #86868B;
            --mac-sidebar: rgba(235, 235, 240, 0.85);
            --border: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--mac-bg);
            color: var(--mac-dark);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            user-select: none; 
        }

        #board-container {
            position: relative; 
            background: white; 
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform-origin: top left; 
            transition: transform 0.1s ease-out;
            margin: 0 auto;
            will-change: transform; 
        }

        /* --- MAC TOP MENUBAR --- */
        .mac-menubar {
            height: 32px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border); z-index: 1000;
            position: relative;
        }
        .mac-menu-left { display: flex; gap: 18px; align-items: center;}
        .mac-menu-right { display: flex; gap: 15px; color: var(--mac-dark); }
        
        /* Universal Apple Logo Fix (SVG to prevent broken rectangles on Windows/Android) */
        .apple-logo { 
            width: 14px; height: 16px; cursor: pointer; transition: 0.2s; color: var(--mac-dark);
            display: flex; align-items: center;
        }
        .apple-logo:hover { transform: scale(1.15); color: var(--mac-blue); }

        /* --- DASHBOARD UI --- */
        #dashboard-view { display: flex; height: calc(100vh - 32px); }
        
        .sidebar {
            width: 250px; background-color: var(--mac-sidebar); backdrop-filter: blur(25px);
            border-right: 1px solid var(--border); padding: 25px 15px;
            display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
        }
        
        .nav-group { margin-bottom: 24px; }
        .nav-group label {
            display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
            color: #888; margin-bottom: 8px; padding-left: 10px; font-weight: 700;
        }
        .nav-btn {
            display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 12px;
            background: transparent; border: none; color: var(--mac-dark); text-align: left;
            font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; transition: 0.15s;
        }
        .nav-btn:hover { background: rgba(0, 0, 0, 0.06); }
        .nav-btn.active { background: var(--mac-blue); color: white; box-shadow: 0 2px 8px rgba(0,122,255,0.3);}

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; height: 100%; box-sizing: border-box; }
        .header h1 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.5px;}
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; margin-top: 30px; padding-bottom: 60px; }
        
        .book-card {
            background: white; border-radius: 16px; padding: 25px 15px; text-align: center;
            cursor: pointer; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .book-icon { font-size: 42px; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .book-title { font-weight: 600; font-size: 14px; color: #333;}

        /* --- AI CHAT UI --- */
        #ai-view-container { display: none; flex-direction: column; height: 100%; max-width: 850px; margin: 0 auto; }
        .chat-box { flex-grow: 1; background: white; border-radius: 16px; border: 1px solid var(--border); padding: 25px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);}
        .msg { padding: 14px 20px; border-radius: 18px; font-size: 15px; max-width: 80%; line-height: 1.5;}
        .msg.ai { background: #f0f0f5; align-self: flex-start; border-bottom-left-radius: 4px; color: #111;}
        .msg.user { background: var(--mac-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px;}
        .chat-input-area { display: flex; gap: 12px; }
        .chat-input-area input { flex-grow: 1; padding: 16px 24px; border-radius: 25px; border: 1px solid #ddd; font-size: 15px; outline: none; transition: 0.2s;}
        .chat-input-area input:focus { border-color: var(--mac-blue); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        .chat-input-area button { background: var(--mac-blue); color: white; border: none; padding: 0 25px; border-radius: 25px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;}
        .chat-input-area button:hover { background: #0062cc; transform: scale(1.02);}

        /* --- WHITEBOARD & PDFs --- */
        #whiteboard-view { display: none; width: 100vw; height: calc(100vh - 32px); position: relative; background: #E5E5EA; }
        
        #viewport {
            width: 100%; height: 100%; overflow: auto; position: relative; touch-action: auto;
            padding-bottom: 180px; -webkit-overflow-scrolling: touch;
        }

        #board-wrapper {
            position: relative; margin: 50px auto; 
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            transform-origin: top center; transition: transform 0.15s ease-out;
        }

        .pdf-page-container {
            position: relative; background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-radius: 8px; overflow: hidden;
        }

        #pdf-layer, .canvas-container { position: absolute !important; top: 0; left: 0; }
        #pdf-layer { z-index: 5; }
        .canvas-container { z-index: 10; }

        /* Full Screen Loading Overlay */
        #loading-screen {
            display: none; position: fixed; top: 32px; left: 0; width: 100vw; height: calc(100vh - 32px);
            background: rgba(245, 245, 247, 0.9); backdrop-filter: blur(10px); z-index: 2000;
            flex-direction: column; justify-content: center; align-items: center; color: var(--mac-dark);
        }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid var(--mac-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MAC OS DOCK --- */
        .mac-dock-wrapper {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }

        .mac-dock {
            display: flex; gap: 6px; background: rgba(255, 255, 255, 0.85); padding: 10px 14px;
            border-radius: 28px; backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15); align-items: center;
            overflow-x: auto; max-width: 95vw;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom center;
        }
        .mac-dock.hidden { transform: scale(0) translateY(50px); opacity: 0; pointer-events: none; }
        .mac-dock::-webkit-scrollbar { display: none; }
        
        .dock-btn {
            background: transparent; border: none; color: var(--mac-dark); font-size: 20px;
            width: 44px; height: 44px; border-radius: 14px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .dock-btn:hover { background: rgba(0,0,0,0.06); transform: translateY(-2px);}
        .dock-btn.active { background: rgba(0, 0, 0, 0.08); box-shadow: inset 0 2px 5px rgba(0,0,0,0.08); transform: translateY(0);}

        .dock-divider { width: 1px; height: 34px; background: rgba(0,0,0,0.12); margin: 0 6px; }

        .color-swatch {
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .color-swatch.active { border-color: rgba(0,0,0,0.5); transform: scale(1.2); box-shadow: 0 3px 8px rgba(0,0,0,0.25);}

        .master-btn {
            width: 54px; height: 54px; border-radius: 50%; border: none;
            background: var(--mac-blue); color: white; font-size: 26px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.4); z-index: 101; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .master-btn.collapsed { background: #34C759; box-shadow: 0 6px 20px rgba(52, 199, 89, 0.4); transform: rotate(-45deg) scale(0.9); }

        /* --- POPUP SLIDERS --- */
        .popup-panel {
            display: none; position: absolute; bottom: 105px;
            background: rgba(250, 250, 250, 0.95); backdrop-filter: blur(25px); border-radius: 16px; padding: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.08); z-index: 105;
            flex-direction: column; gap: 12px; align-items: center; width: 180px;
        }
        .popup-panel.show { display: flex; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { from { transform: translateY(20px) scale(0.9); opacity: 0;} to { transform: translateY(0) scale(1); opacity: 1;} }
        
        .popup-panel label { font-size: 13px; font-weight: 700; color: var(--mac-dark); letter-spacing: 0.5px;}
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%;
            background: white; border: 1px solid rgba(0,0,0,0.2);
            box-shadow: 0 3px 8px rgba(0,0,0,0.2); margin-top: -9px;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 5px; background: rgba(0,0,0,0.15); border-radius: 3px; }

        #toast { display: none; position: fixed; top: 45px; right: 20px; background: #34c759; color: white; padding: 16px 28px; border-radius: 12px; z-index: 1000; font-weight: bold; font-size: 14px; box-shadow: 0 6px 15px rgba(0,0,0,0.15);}

        /* --- MULTI-DEVICE RESPONSIVE UPGRADES --- */
        @media (max-width: 1024px) {
            .mac-dock { gap: 4px; padding: 8px 10px; }
            .dock-btn { width: 40px; height: 40px; font-size: 18px;}
        }
        @media (max-width: 768px) {
            #dashboard-view { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); padding: 15px; }
            .main-content { padding: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px;}
            .mac-menubar { font-size: 12px; }
            .mac-dock { padding: 6px; border-radius: 20px;}
            .dock-btn { width: 36px; height: 36px; font-size: 16px;}
            .color-swatch { width: 22px; height: 22px; }
            .master-btn { width: 48px; height: 48px; font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- MAC OS TOP MENUBAR -->
    <div class="mac-menubar">
        <div class="mac-menu-left">
            <!-- Perfect Vector Apple Logo -->
            <div class="apple-logo" onclick="closeBook()" title="Return to Dashboard">
                <svg viewBox="0 0 384 512" width="100%" height="100%"><path fill="currentColor" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.3 48.6-.6 83.1-77.5 106.9-125.7-18.4-11.4-65.7-38.3-66-84.9zM260.7 93C277.6 71 289.8 40.5 286.7 11.2 260.8 15.3 227 34.6 209 56c-15.1 17.6-29 49.3-25.1 79.5 28.5 2.1 59.8-15.8 76.8-42.5z"/></svg>
            </div>
            <span>MES 7A</span>
            <span id="top-title" style="color:#666;">Dashboard</span>
        </div>
        <div class="mac-menu-right">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <!-- FULL SCREEN LOADER -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <h3 style="margin:0;">Generating 4K Content...</h3>
    </div>

    <!-- PORTAL DASHBOARD -->
    <div id="dashboard-view">
        <div class="sidebar">
            <div class="nav-group">
                <label>Favorites</label>
                <button class="nav-btn" onclick="openBlankCanvas()">🪄 Blank Endless Canvas</button>
                <button class="nav-btn" id="btn-AI" onclick="openAIView()">🧠 7A Custom AI</button>
            </div>
            <div class="nav-group">
                <label>Languages</label>
                <button id="btn-English" class="nav-btn active" onclick="selectSection('English')">📝 English</button>
                <button id="btn-Hindi" class="nav-btn" onclick="selectSection('Hindi')">📙 Hindi</button>
                <button id="btn-Malayalam" class="nav-btn" onclick="selectSection('Malayalam')">🌴 Malayalam</button>
            </div>
            <div class="nav-group">
                <label>Science & Math</label>
                <button id="btn-MathsPart1" class="nav-btn" onclick="selectSection('MathsPart1')">📐 Maths (Pt 1)</button>
                <button id="btn-MathsPart2" class="nav-btn" onclick="selectSection('MathsPart2')">📐 Maths (Pt 2)</button>
                <button id="btn-GS" class="nav-btn" onclick="selectSection('GS')">🔬 Gen Science</button>
            </div>
            <div class="nav-group">
                <label>Social Science</label>
                <button id="btn-SSPart1" class="nav-btn" onclick="selectSection('SSPart1')">🌍 SS (Pt 1)</button>
                <button id="btn-SSPart2" class="nav-btn" onclick="selectSection('SSPart2')">🌍 SS (Pt 2)</button>
            </div>
        </div>

        <div class="main-content">
            <div id="books-view-container">
                <h1 id="dashboard-title">English Textbooks</h1>
                <div class="grid" id="books-grid"></div>
            </div>

            <!-- Custom AI View -->
            <div id="ai-view-container">
                <h1>MES Custom AI Assistant</h1>
                <p style="color: #666;">Powered by local 7A syllabus training.</p>
                <div class="chat-box" id="chat-box">
                    <div class="msg ai">Hello! I have been trained on all your English, Hindi, Malayalam, Maths, GS, and SS textbooks. What subject are we teaching today?</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="ai-input" placeholder="Type 'SS Quiz', 'Maths Lesson Plan', etc...">
                    <button onclick="sendAIMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- WHITEBOARD CONTINUOUS SCROLL -->
    <div id="whiteboard-view">
        <div id="viewport">
            <div id="board-wrapper">
                <!-- Canvases get injected here -->
            </div>
        </div>

        <!-- MAC OS DOCK -->
        <div class="mac-dock-wrapper">
            
            <!-- POPUP SLIDERS -->
            <div class="popup-panel" id="zoom-slider-popup">
                <label>Zoom Level</label>
                <input type="range" id="zoom-slider" min="0.4" max="3.0" step="0.1" value="1.3" oninput="handleZoomSlider(this.value)">
            </div>
            <div class="popup-panel" id="thickness-slider-popup">
                <label>Brush Settings</label>
                <input type="range" id="weight-slider" min="1" max="50" step="1" value="4" oninput="updateProfile()">
            </div>

            <!-- Main Dock Panel -->
            <div class="mac-dock" id="main-dock">
                <button class="dock-btn" onclick="closeBook()" title="Exit to Dashboard">🏠</button>
                <button class="dock-btn" onclick="togglePopup('zoom-slider-popup')" title="Adjust Zoom">🔍</button>
                <button class="dock-btn" onclick="exportToPDF()" title="Print/Export PDF">🖨️</button>
                <button class="dock-btn" onclick="readAloud()" title="AI Read Aloud">🗣️</button>
                <div class="dock-divider"></div>
                
                <button class="dock-btn" id="tool-move" onclick="setTool('move')" title="Pan Canvas">✋</button>
                <button class="dock-btn active" id="tool-pen" onclick="setTool('pen')" title="Pen">🖊️</button>
                <button class="dock-btn" id="tool-highlighter" onclick="setTool('highlighter')" title="Highlighter">🖍️</button>
                <button class="dock-btn" id="tool-text" onclick="setTool('text')" title="Type Text">🔤</button>
                <button class="dock-btn" onclick="togglePopup('thickness-slider-popup')" title="Adjust Size">📏</button>
                <div class="dock-divider"></div>

                <!-- 5 Apple Colors -->
                <div class="color-swatch active" style="background:#FF3B30" onclick="setColor('#FF3B30', this)"></div>
                <div class="color-swatch" style="background:#FFCC00" onclick="setColor('#FFCC00', this)"></div>
                <div class="color-swatch" style="background:#34C759" onclick="setColor('#34C759', this)"></div>
                <div class="color-swatch" style="background:#007AFF" onclick="setColor('#007AFF', this)"></div>
                <div class="color-swatch" style="background:#1C1C1E" onclick="setColor('#1C1C1E', this)"></div>
                <div class="dock-divider"></div>

                <!-- Erasers -->
                <button class="dock-btn" id="tool-white-eraser" onclick="setTool('white-eraser')" style="display:none;" title="White Eraser Brush">🧽</button>
                <button class="dock-btn" id="tool-tap-eraser" onclick="setTool('tap-eraser')" title="Tap Eraser (Click to Delete)">🎯</button>
                <button class="dock-btn" onclick="clearCurrentPage()" title="Clear Active Page Only">🧹</button>
                <button class="dock-btn" onclick="clearAllPages()" style="color: #ff3b30;" title="Clear Entire Document">💣</button>
                
                <div class="dock-divider"></div>
                <!-- Shapes -->
                <button class="dock-btn" id="tool-rect" onclick="setTool('rect')">⬜</button>
                <button class="dock-btn" id="tool-circle" onclick="setTool('circle')">⭕</button>
                <button class="dock-btn" id="tool-triangle" onclick="setTool('triangle')">🔺</button>
            </div>

            <!-- Master Toggle Button -->
            <button class="master-btn" id="master-toggle" onclick="toggleDock()">❖</button>
        </div>
    </div>

    <div id="toast">Notes Saved! ✅</div>

    <script>

            ],

        const titleMap = {

        };

        let currentSection = "English";
        let activeBook = null;
        let pdfDoc = null;
        let baseScale = 1.3; 
        let viewZoom = 1.0; 
        let fabricCanvases = [];
        let currentTool = 'pen';
        let activeColor = '#FF3B30'; 
        let pageDrawings = JSON.parse(localStorage.getItem('smartboard_mac_notes')) || {};

        function selectSection(sectionName) {
            currentSection = sectionName;

        function renderDashboardBooks() {

        function togglePopup(id) {

        function toggleDock() {

        // --- AI LOGIC ---
        function openAIView() {

        function sendAIMessage() {

            const chatBox = document.getElementById('chat-box');
            const query = input.value.trim().toLowerCase();
            if (query === "") return;

            const userMsg = document.createElement('div');

            chatBox.appendChild(userMsg);
            input.value = ''; chatBox.scrollTop = chatBox.scrollHeight;

            const localKnowledgeBase = {
                "english": "📚 **English Framework:** The 7A English syllabus focuses heavily on communicative prose, vocabulary building, and comprehension. E.g., 'Animals, Birds, and Dr. Dolittle'.",
                "hindi": "📙 **Hindi Blueprint:** Focuses on foundational grammar, literature, and vocabulary spanning 10 chapters.",
                "maths": "📐 **Maths Syllabus:** Covers equations, angles, geometry, advanced problem solving and complex measurements.",
                "science": "🔬 **General Science:** Spans 12 chapters covering physics, biology, and chemistry basics.",
                "ss": "🌍 **Social Science:** Covers History, Geography, Civics, and Government structures.",
            };

                for (let keyword in localKnowledgeBase) {
                    if (query.includes(keyword)) { matchedResponse = localKnowledgeBase[keyword]; break; }
                }
                aiMsg.innerHTML = matchedResponse.replace(/\n/g, "<br>");
                chatBox.appendChild(aiMsg);
                chatBox.scrollTop = chatBox.scrollHeight;

        }

        // --- DYNAMIC ENDLESS CANVAS ---
        function openBlankCanvas() {
            activeBook = { title: "Blank Canvas", isBlank: true };
            viewZoom = 1.0; document.getElementById('zoom-slider').value = viewZoom;
            document.getElementById('board-wrapper').style.transform = `scale(1)`;
            document.getElementById('top-title').textContent = "Endless Canvas";
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('whiteboard-view').style.display = 'flex';
            
            // Show White Eraser, Hide Tap Eraser
            document.getElementById('tool-white-eraser').style.display = 'flex';
            document.getElementById('tool-tap-eraser').style.display = 'none';

            const wrapper = document.getElementById('board-wrapper');
            wrapper.innerHTML = ''; fabricCanvases = [];

            const pageDiv = document.createElement('div');
            pageDiv.className = 'pdf-page-container';
            pageDiv.style.width = '1200px'; pageDiv.style.height = '1600px'; 

            const drawCanv = document.createElement('canvas');
            pageDiv.appendChild(drawCanv);
            wrapper.appendChild(pageDiv);

            const fCanvas = new fabric.Canvas(drawCanv, { 
                width: 1200, height: 1600, isDrawingMode: true, allowTouchScrolling: false, enableRetinaScaling: true
            });
            fCanvas.freeDrawingBrush.decimate = 3; 

            fabricCanvases.push({ canvas: fCanvas, key: `BlankCanvas_Master` });
            setupFabricEvents(fCanvas, `BlankCanvas_Master`);

            fCanvas.on('path:created', function(e) {
                const path = e.path;
                if (path.top + path.height > fCanvas.height - 200) {
                    const newHeight = fCanvas.height + 1000;
                    fCanvas.setHeight(newHeight);
                    pageDiv.style.height = `${newHeight}px`;
                    fCanvas.calcOffset();
                }
            });

            setTool('pen');
            const viewport = document.getElementById('viewport');
            viewport.scrollLeft = (1200 - window.innerWidth) / 2;
        }

        // --- ULTRA 4K RESPONSIVE PDF ENGINE ---
        function openBook(book) {
            activeBook = book; activeBook.isBlank = false;
            viewZoom = 1.0; document.getElementById('zoom-slider').value = viewZoom;
            document.getElementById('board-wrapper').style.transform = `scale(1)`;
            document.getElementById('top-title').textContent = book.title;
            
            // Hide White Eraser, Show Tap Eraser
            document.getElementById('tool-white-eraser').style.display = 'none';
            document.getElementById('tool-tap-eraser').style.display = 'flex';
            if(currentTool === 'white-eraser') currentTool = 'pen';
            
            // Dynamic Screen Scaling
            const screenW = window.innerWidth;
            if (screenW < 500) baseScale = (screenW - 40) / 600; 
            else if (screenW < 768) baseScale = 0.9;
            else if (screenW < 1024) baseScale = 1.2; 
            else baseScale = 1.5; 
            
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('whiteboard-view').style.display = 'flex';
            document.getElementById('loading-screen').style.display = 'flex';
            
            pdfjsLib.getDocument(book.file).promise.then(pdf => {
                pdfDoc = pdf; renderContinuousPages();
            }).catch(err => {
                console.error("PDF Loading Error Details:", err);
                alert(`File loading error: "${book.file}". Make sure your files are correctly placed in the Subjects folder.`);
                document.getElementById('loading-screen').style.display = 'none';
                closeBook();
            });
        }

        function renderContinuousPages() {
            const wrapper = document.getElementById('board-wrapper');
            wrapper.innerHTML = ''; fabricCanvases = [];
            let promises = [];

            for (let num = 1; num <= pdfDoc.numPages; num++) {
                promises.push(pdfDoc.getPage(num).then(page => {
                    const pageDiv = document.createElement('div'); pageDiv.className = 'pdf-page-container';
                    const pdfCanv = document.createElement('canvas'); pdfCanv.style.position = 'absolute'; pdfCanv.style.zIndex = '5';
                    const drawCanv = document.createElement('canvas'); drawCanv.style.position = 'absolute'; drawCanv.style.zIndex = '10';
                    pageDiv.appendChild(pdfCanv); pageDiv.appendChild(drawCanv);
                    return { page, num, pageDiv, pdfCanv, drawCanv };
                }));
            }

            Promise.all(promises).then(results => {
                results.sort((a,b) => a.num - b.num);
                results.forEach(res => {
                    wrapper.appendChild(res.pageDiv);
                    
                    // Base CSS Scale
                    const cssViewport = res.page.getViewport({ scale: baseScale });
                    res.pageDiv.style.width = `${cssViewport.width}px`; 
                    res.pageDiv.style.height = `${cssViewport.height}px`;
                    
                    // ULTRA 4K MAX CLARITY (Device Pixel Ratio Multiplier)
                    // The standard devicePixelRatio on smartboards is 1 or 2. We push it to ensure crystal clarity.
                    const dpr = window.devicePixelRatio || 1;
                    const qualityScale = baseScale * dpr * 2.5; 
                    const renderViewport = res.page.getViewport({ scale: qualityScale });
                    
                    res.pdfCanv.width = renderViewport.width; 
                    res.pdfCanv.height = renderViewport.height;
                    res.pdfCanv.style.width = `${cssViewport.width}px`; 
                    res.pdfCanv.style.height = `${cssViewport.height}px`;

                    const renderContext = res.pdfCanv.getContext('2d');

                    res.page.render({ canvasContext: renderContext, viewport: renderViewport }).promise.then(() => {
                        const fCanvas = new fabric.Canvas(res.drawCanv, { 
                            width: cssViewport.width, height: cssViewport.height, isDrawingMode: true, allowTouchScrolling: false, 
                            enableRetinaScaling: true // Makes Fabric ink retina-sharp on the smartboard
                        });
                        fCanvas.freeDrawingBrush.decimate = 2;
                        const storageKey = `${activeBook.title}_page_${res.num}`;
                        fabricCanvases.push({ canvas: fCanvas, key: storageKey });
                        setupFabricEvents(fCanvas, storageKey);
                    });
                });
                document.getElementById('loading-screen').style.display = 'none';
                setTimeout(() => { setTool(currentTool); }, 300);
            });
        }

        // --- CORE DRAWING EVENTS ---
        function setupFabricEvents(fCanvas, storageKey) {
            if (pageDrawings[storageKey]) { fCanvas.loadFromJSON(pageDrawings[storageKey], fCanvas.renderAll.bind(fCanvas)); }
            let isDrawingShape = false; let shapeStartX, shapeStartY; let tempObj = null;

            fCanvas.on('mouse:down', function(options) {
                if (currentTool === 'tap-eraser' && options.target) {
                    fCanvas.remove(options.target); pageDrawings[storageKey] = fCanvas.toJSON(); return;
                }
                
                if (currentTool === 'text') {
                    const pointer = fCanvas.getPointer(options.e);
                    const textObj = new fabric.IText('Type...', { left: pointer.x, top: pointer.y, fill: activeColor, fontSize: Math.max(32, 24 * baseScale), fontFamily: '-apple-system, sans-serif', fontWeight: 'bold' });
                    fCanvas.add(textObj); fCanvas.setActiveObject(textObj);
                    textObj.enterEditing(); textObj.selectAll(); setTool('pen'); return;
                }

                if (['rect', 'circle', 'triangle'].includes(currentTool)) {
                    if (options.target) return; 
                    isDrawingShape = true;
                    const pointer = fCanvas.getPointer(options.e);
                    shapeStartX = pointer.x; shapeStartY = pointer.y;
                    const weight = parseInt(document.getElementById('weight-slider').value);

                    if (currentTool === 'rect') tempObj = new fabric.Rect({ left: shapeStartX, top: shapeStartY, width: 0, height: 0, fill: 'transparent', stroke: activeColor, strokeWidth: weight, selectable: true });
                    else if (currentTool === 'circle') tempObj = new fabric.Circle({ left: shapeStartX, top: shapeStartY, radius: 0, fill: 'transparent', stroke: activeColor, strokeWidth: weight, selectable: true });
                    else if (currentTool === 'triangle') tempObj = new fabric.Triangle({ left: shapeStartX, top: shapeStartY, width: 0, height: 0, fill: 'transparent', stroke: activeColor, strokeWidth: weight, selectable: true });
                    fCanvas.add(tempObj);
                }
            });

            fCanvas.on('mouse:move', function(o) {
                if (!isDrawingShape) return;
                const pointer = fCanvas.getPointer(o.e);
                if (currentTool === 'rect' || currentTool === 'triangle') {
                    if (shapeStartX > pointer.x) tempObj.set({ left: Math.abs(pointer.x) });
                    if (shapeStartY > pointer.y) tempObj.set({ top: Math.abs(pointer.y) });
                    tempObj.set({ width: Math.abs(shapeStartX - pointer.x) });
                    tempObj.set({ height: Math.abs(shapeStartY - pointer.y) });
                } else if (currentTool === 'circle') {
                    const rx = Math.abs(shapeStartX - pointer.x) / 2; const ry = Math.abs(shapeStartY - pointer.y) / 2;
                    tempObj.set({ radius: Math.max(rx, ry) });
                    if (shapeStartX > pointer.x) tempObj.set({ left: pointer.x });
                    if (shapeStartY > pointer.y) tempObj.set({ top: pointer.y });
                }
                fCanvas.renderAll();
            });

            fCanvas.on('mouse:up', function() { if (isDrawingShape) { isDrawingShape = false; tempObj = null; pageDrawings[storageKey] = fCanvas.toJSON(); }});
            fCanvas.on('object:added', () => pageDrawings[storageKey] = fCanvas.toJSON());
            fCanvas.on('object:modified', () => pageDrawings[storageKey] = fCanvas.toJSON());
        }

        // --- HARDWARE TOOL ROUTER ---
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.dock-btn').forEach(btn => btn.classList.remove('active'));
            if(document.getElementById(`tool-${tool}`)) document.getElementById(`tool-${tool}`).classList.add('active');

            const viewportContainer = document.getElementById('viewport');
            const wrapper = document.getElementById('board-wrapper');

            if (tool === 'move') {
                fabricCanvases.forEach(fc => { fc.canvas.isDrawingMode = false; fc.canvas.selection = false; fc.canvas.forEachObject(o => o.selectable = false); });
                wrapper.style.pointerEvents = 'none'; viewportContainer.style.touchAction = 'auto'; viewportContainer.style.cursor = 'grab'; 
            } else {
                wrapper.style.pointerEvents = 'all'; viewportContainer.style.touchAction = 'none'; viewportContainer.style.cursor = 'default';

                fabricCanvases.forEach(fc => {
                    if (['pen', 'highlighter', 'white-eraser'].includes(tool)) {
                        fc.canvas.isDrawingMode = true; fc.canvas.selection = false; fc.canvas.forEachObject(o => o.selectable = false);
                        fc.canvas.freeDrawingBrush = new fabric.PencilBrush(fc.canvas);
                        if (tool === 'white-eraser') fc.canvas.freeDrawingBrush.color = '#FFFFFF';
                    } else {
                        fc.canvas.isDrawingMode = false;
                        fc.canvas.selection = (tool === 'tap-eraser' || tool === 'text' || ['rect', 'circle', 'triangle'].includes(tool));
                        fc.canvas.forEachObject(o => o.selectable = fc.canvas.selection);
                    }
                });
                updateProfile();
            }
        }

        function setColor(hex, el) {
            activeColor = hex;
            document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('active'));
            el.classList.add('active'); updateProfile();
        }

        function updateProfile() {
            const weight = parseInt(document.getElementById('weight-slider').value);
            fabricCanvases.forEach(fc => {
                if (currentTool === 'pen') {
                    if (fc.canvas.freeDrawingBrush) { fc.canvas.freeDrawingBrush.color = activeColor; fc.canvas.freeDrawingBrush.width = weight; }
                } else if (currentTool === 'highlighter') {
                    if (fc.canvas.freeDrawingBrush) {
                        const r = parseInt(activeColor.slice(1,3), 16); const g = parseInt(activeColor.slice(3,5), 16); const b = parseInt(activeColor.slice(5,7), 16);
                        fc.canvas.freeDrawingBrush.color = `rgba(${r}, ${g}, ${b}, 0.35)`; fc.canvas.freeDrawingBrush.width = weight * 4;
                    }
                } else if (currentTool === 'white-eraser') {
                    if (fc.canvas.freeDrawingBrush) { fc.canvas.freeDrawingBrush.color = '#FFFFFF'; fc.canvas.freeDrawingBrush.width = weight * 4; }
                }
            });
        }

        function handleZoomSlider(val) {
            viewZoom = parseFloat(val);
            document.getElementById('board-wrapper').style.transform = `scale(${viewZoom})`;
            setTimeout(() => { fabricCanvases.forEach(fc => fc.canvas.calcOffset()); }, 100);
        }

        // --- PAN ENGINE (Passive False included for performance) ---
        const viewportContainer = document.getElementById('viewport');
        let isPanning = false, panStartX, panStartY, scrollL, scrollT;

        function getPointerCoords(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }
        function startPan(e) {
            if (currentTool !== 'move') return;
            isPanning = true; viewportContainer.style.cursor = 'grabbing';
            const coords = getPointerCoords(e); panStartX = coords.x; panStartY = coords.y; scrollL = viewportContainer.scrollLeft; scrollT = viewportContainer.scrollTop;
        }
        function movePan(e) {
            if (!isPanning || currentTool !== 'move') return;
            if (e.cancelable) { e.preventDefault(); e.stopPropagation(); }
            const coords = getPointerCoords(e); viewportContainer.scrollLeft = scrollL - (coords.x - panStartX); viewportContainer.scrollTop = scrollT - (coords.y - panStartY);
        }
        function endPan() { isPanning = false; if(currentTool === 'move') viewportContainer.style.cursor = 'grab'; }

        viewportContainer.addEventListener('mousedown', startPan); window.addEventListener('mouseup', endPan); window.addEventListener('mousemove', movePan);
        viewportContainer.addEventListener('touchstart', startPan, { passive: false }); viewportContainer.addEventListener('touchmove', movePan, { passive: false }); window.addEventListener('touchend', endPan);

        function readAloud() {
            let foundText = false;
            fabricCanvases.forEach(fc => {
                const activeObj = fc.canvas.getActiveObject();
                if (activeObj && activeObj.type === 'i-text') {
                    const speech = new SpeechSynthesisUtterance(activeObj.text); speech.lang = 'en-IN'; window.speechSynthesis.speak(speech);
                    foundText = true;
                }
            });
            if(!foundText) alert("Select typed text to read aloud.");
        }

        function exportToPDF() { if (activeBook) window.print(); }

        function manualSave() {
            localStorage.setItem('smartboard_mac_notes', JSON.stringify(pageDrawings));
            const title = document.getElementById('top-title'); const original = title.textContent;
            title.textContent = "Saved ✅"; title.style.color = "#34C759";
            setTimeout(() => { title.textContent = original; title.style.color = "#666"; }, 1500);
        }
        setInterval(() => { if (activeBook && fabricCanvases.length > 0) localStorage.setItem('smartboard_mac_notes', JSON.stringify(pageDrawings)); }, 60000);

        // --- FLAWLESS "CLEAR ACTIVE PAGE" LOGIC ---
        function clearCurrentPage() {
            const viewport = document.getElementById('viewport');
            const viewportRect = viewport.getBoundingClientRect();
            let targetFC = null;
            let maxVisibleHeight = 0;

            if (fabricCanvases.length === 1) {
                targetFC = fabricCanvases[0].canvas;
            } else {
                // Find the canvas that takes up the most space on the screen right now
                fabricCanvases.forEach(fc => {
                    const el = fc.canvas.getElement().parentNode; // Container representing the page
                    const rect = el.getBoundingClientRect();
                    
                    const visibleTop = Math.max(rect.top, viewportRect.top);
                    const visibleBottom = Math.min(rect.bottom, viewportRect.bottom);
                    const visibleHeight = Math.max(0,Normally I can help with things like this, but I don't seem to have access to that content. You can try again or ask me for something else.
                    visibleBottom - visibleTop);
                    
                    if (visibleHeight > maxVisibleHeight) {
                        maxVisibleHeight = visibleHeight;
                        targetFC = fc.canvas;
                    }
                });
            }

            if (targetFC) {
                targetFC.clear();
                // Ensure we save the cleared state
                fabricCanvases.forEach(fc => {
                    if (fc.canvas === targetFC) {
                        pageDrawings[fc.key] = targetFC.toJSON();
                    }
                });
                manualSave();
                
                // Visual feedback
                const title = document.getElementById('top-title');
                const originalText = title.textContent;
                title.textContent = "Page Cleared 🧹";
                setTimeout(() => { title.textContent = originalText; }, 1500);
            }
        }

        function clearAllPages() {
            if (confirm("⚠️ Clear ALL notes across every single page?")) {
                fabricCanvases.forEach(fc => { 
                    fc.canvas.clear(); 
                    pageDrawings[fc.key] = fc.canvas.toJSON(); 
                });
                localStorage.setItem('smartboard_mac_notes', JSON.stringify(pageDrawings));
                const title = document.getElementById('top-title'); 
                const originalText = title.textContent;
                title.textContent = "Entire Board Reset Clean 🗑️"; 
                title.style.color = "#ff3b30";
                setTimeout(() => { title.textContent = originalText; title.style.color = "#666"; }, 2500);
            }
        }

        function closeBook() {
            manualSave();
            ['zoom-slider-popup', 'thickness-slider-popup'].forEach(pid => document.getElementById(pid).classList.remove('show'));
            fabricCanvases.forEach(fc => fc.canvas.dispose()); fabricCanvases = [];
            document.getElementById('top-title').textContent = "Dashboard";
            document.getElementById('whiteboard-view').style.display = 'none'; 
            document.getElementById('dashboard-view').style.display = 'flex';
        }

        // Initialize default view
        selectSection('English');
    </script>
